name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: cd apps/api && pnpm run typecheck

      - name: Typecheck Web
        run: cd apps/web && npx tsc --noEmit

  build:
    name: Build API & Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: cd apps/api && pnpm run build

      - name: Build Web
        run: cd apps/web && pnpm run build

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    if: always()

    steps:
      - name: Decide whether the checks passed
        run: |
          if [[ "${{ needs.typecheck.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
