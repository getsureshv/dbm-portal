# ─── Render Blueprint: DBM Portal PREVIEW (feature/persona-access) ──────────
# Docs: https://render.com/docs/blueprint-spec
#
# Purpose: an ISOLATED preview of the persona-access work that external testers
# can reach at a STABLE URL, without the flaky cloudflared tunnel and WITHOUT
# touching the `main`-driven production services.
#
#   * Services track the `feature/persona-access` branch (NOT main).
#   * Service names are suffixed `-preview` so they never collide with the
#     production services defined in render.yaml.
#   * autoDeploy is ON so every push to feature/persona-access redeploys the
#     preview automatically.
#
# ⚠️ DATABASE NOTE (per explicit user decision, 2026-06-16):
#   This preview REUSES THE PRODUCTION DATABASE `dbm-portal-db`. It does NOT
#   define its own database. Consequences the user accepted:
#     - The API container entrypoint runs `prisma migrate deploy` on deploy, so
#       the search-index migration (20260616171500_record_search_indexes) will
#       apply to the LIVE production database. It is additive (CREATE INDEX /
#       CREATE EXTENSION IF NOT EXISTS) and does not alter existing columns.
#     - The base seed is idempotent (all upserts) and re-asserts the same
#       personas/entities/test taxonomy already present in production.
#     - Any records or record-grants testers create on the preview land in the
#       REAL production data.
#   To switch to an isolated DB later, uncomment the `databases:` block below
#   and change both `fromDatabase.name` references to `dbm-portal-db-preview`.
#
# HOW TO APPLY (you, in the Render dashboard):
#   1. Render → New + → Blueprint
#   2. Connect the getsureshv/dbm-portal repo
#   3. IMPORTANT: set the Blueprint file path to `render.preview.yaml`
#      and the branch to `feature/persona-access`
#   4. Apply → fill the `sync: false` secrets (copy the same values you used
#      for the production services; see the checklist in the chat)
#   5. Deploy. First boot runs migrate + seed, then starts the API.

# ── Isolated preview DB (DISABLED — preview reuses production per user choice) ──
# databases:
#   - name: dbm-portal-db-preview
#     plan: basic-256mb
#     databaseName: dbm_portal
#     user: dbm
#     postgresMajorVersion: 16
#     ipAllowList: []

services:
  # ─── API (NestJS) — PREVIEW ────────────────────────────────
  - type: web
    name: dbm-portal-api-preview
    runtime: docker
    plan: starter
    region: oregon
    branch: feature/persona-access          # ← tracks the feature branch, not main
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Reuses the EXISTING production database (defined in render.yaml).
      - key: DATABASE_URL
        fromDatabase:
          name: dbm-portal-db
          property: connectionString
      # CORS compares origin.startsWith(WEB_URL); point at the preview web host.
      - key: WEB_URL
        value: https://dbm-portal-web-preview.onrender.com
      # ── Secrets — fill in the Render dashboard (same values as production) ──
      - key: SESSION_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false

  # ─── Web (Next.js) — PREVIEW ───────────────────────────────
  - type: web
    name: dbm-portal-web-preview
    runtime: docker
    plan: starter
    region: oregon
    branch: feature/persona-access          # ← tracks the feature branch, not main
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Server-side rewrite target — point the preview web at the preview API.
      - key: NEXT_PUBLIC_API_URL
        value: https://dbm-portal-api-preview.onrender.com
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
