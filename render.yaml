# ─── Render Blueprint for DBM Construction Portal ──────────────
# Docs: https://render.com/docs/blueprint-spec
#
# This Blueprint provisions:
#   - 1 managed PostgreSQL 16 database
#   - 1 NestJS API service (Docker)
#   - 1 Next.js Web service (Docker)
#
# After merging this file to main, in Render:
#   1. New + → Blueprint → connect this repo → Apply
#   2. Fill in the secrets marked `sync: false` in the dashboard
#   3. Trigger a deploy

databases:
  - name: dbm-portal-db
    plan: basic-256mb        # $6/mo · upgrade to standard for prod traffic
    databaseName: dbm_portal
    user: dbm
    postgresMajorVersion: 16
    ipAllowList: []          # private network only

services:
  # ─── API (NestJS) ──────────────────────────────────────────
  - type: web
    name: dbm-portal-api
    runtime: docker
    plan: starter            # $7/mo · scale up when warm needed
    region: oregon           # change if you prefer ohio/frankfurt/singapore
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    # Note: We do NOT use preDeployCommand because Render's pre-deploy step
    # runs in a separate ephemeral container and its stderr is unreliably
    # surfaced in deploy logs. Migrations + seed run in the container CMD
    # instead (see apps/api/Dockerfile), so failures show up in service logs.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: dbm-portal-db
          property: connectionString
      # WEB_URL needs the https:// prefix because CORS origins are compared
      # with origin.startsWith(WEB_URL). Hardcoded against the service name
      # since Render derives hostnames from service names predictably.
      - key: WEB_URL
        value: https://dbm-portal-web.onrender.com
      # ── Secrets — fill these in the Render dashboard ──
      - key: SESSION_SECRET
        generateValue: true    # Render generates a 32-char random string
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      # For Cloudflare R2: set AWS_S3_ENDPOINT to
      # https://<account-id>.r2.cloudflarestorage.com and AWS_REGION=auto.
      - key: AWS_S3_ENDPOINT
        sync: false

      # ── Speech-to-text (OpenAI Whisper) ──
      # REQUIRED for voice-memo transcription. Without it, STT breaks.
      - key: OPENAI_API_KEY
        sync: false
      # Optional model overrides — code defaults are used if left unset.
      # WHISPER_MODEL default: whisper-1
      - key: WHISPER_MODEL
        sync: false
      # AI_MODEL default: claude-sonnet-4-6 (in-chat AI assistant)
      - key: AI_MODEL
        sync: false
      # TRANSLATE_MODEL default: claude-haiku-4-5-20251001 (message translation)
      - key: TRANSLATE_MODEL
        sync: false

      # ── Permits / jurisdiction data sources ──
      # Shovels (building permits)
      - key: SHOVELS_API_KEY
        sync: false
      # Dallas OpenData / Socrata (open-data permits; empty = rate-limited anon access)
      - key: DALLAS_OPENDATA_APP_TOKEN
        sync: false
      - key: SOCRATA_APP_TOKEN
        sync: false
      # Accela permits (all four needed for the Accela adapter)
      - key: ACCELA_APP_ID
        sync: false
      - key: ACCELA_APP_SECRET
        sync: false
      # ACCELA_AGENCY default: DALLAS_TX · ACCELA_ENV default: Sandbox
      - key: ACCELA_AGENCY
        sync: false
      - key: ACCELA_ENV
        sync: false

      # ── Vendor / business discovery providers ──
      # Each is optional; an empty key simply skips that provider.
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FOURSQUARE_API_KEY
        sync: false
      - key: YELP_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
      # Comma-separated allow-list of discovery providers to merge into results
      # (e.g. "google-places"). Empty = no extra providers merged.
      - key: WEB_SEARCH_MERGE
        sync: false

      # ── Misc ──
      # CORS_ALLOW_ALL="true" relaxes CORS (dev/debug only). Default: false.
      - key: CORS_ALLOW_ALL
        sync: false

  # ─── Web (Next.js) ─────────────────────────────────────────
  - type: web
    name: dbm-portal-web
    runtime: docker
    plan: starter            # $7/mo
    region: oregon
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
    # Render automatically forwards envVars below as Docker --build-arg
    # since the Dockerfile declares matching ARG instructions.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Server-side rewrite target — used by next.config.js rewrites.
      - key: NEXT_PUBLIC_API_URL
        value: https://dbm-portal-api.onrender.com
      # Firebase client SDK (public — these ship to the browser anyway).
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
